<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/html/app>
        Require all denied
    </Directory>

    <Directory /var/www/html/bootstrap>
        Require all denied
    </Directory>

    <Directory /var/www/html/config>
        Require all denied
    </Directory>

    <Directory /var/www/html/database>
        Require all denied
    </Directory>

    <Directory /var/www/html/lang>
        Require all denied
    </Directory>

    <Directory /var/www/html/resources>
        Require all denied
    </Directory>

    <Directory /var/www/html/routes>
        Require all denied
    </Directory>

    <Directory /var/www/html/storage>
        Require all denied
    </Directory>

    <Directory /var/www/html/tests>
        Require all denied
    </Directory>

    <Directory /var/www/html/vendor>
        Require all denied
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
